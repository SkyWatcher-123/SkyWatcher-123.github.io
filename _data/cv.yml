  summary: >-
    Jiaying (Vina) Wei is a Ph.D. candidate in Computational Design at Carnegie Mellon University School of Architecture.
    Her research focuses on architectural robotics, robotic perception, multi-robot construction workflows, and computational
    design-to-fabrication systems. Her work connects robotic planning, sensing, machine learning, and architectural fabrication.

