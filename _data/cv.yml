  summary: >-
    Jiaying (Vina) Wei is a Ph.D. candidate in Computational Design at Carnegie Mellon University School of Architecture.
    Her research focuses on architectural robotics, robotic perception, multi-robot construction workflows, and computational design-to-fabrication systems.
    She has a background in digital assembly, robotic fabrication, and computational design.

