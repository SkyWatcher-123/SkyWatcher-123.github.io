    Research Experience:
    - bullet: '**Doctoral Research Assistantship — Robotic Plastering with Diffusion Policy** | Carnegie Mellon University
        | 2024-present. PI: Joshua Bard. Developing an imitation-learning workflow for robotic plastering using diffusion
        policy, including data collection, model training, and deployment on heavy-payload industrial robotic systems.'
    - bullet: '**Graduate Research Assistantship — Rethinking Automation with Construction** | Carnegie Mellon University
        | 2021-2023. PIs: Daniel Cardoso Llach and Jean Oh. Developed mobile-robot navigation and sensing workflows for human-centered
        construction robotics, integrating SLAM, UGV hardware, IoT interaction, and construction-site observation.'
    - bullet: '**Independent Research — Robotic Pigment Mixing with Machine Learning** | Carnegie Mellon University | 2021-2023.
        Advisor: Eunsu Kang. Developed a robotic pigment-mixing and painting workflow using machine-learning-based color prediction
        and dataset collection.'
    - bullet: '**Graduate Research Assistantship — Binder-Jetting 3D Printing Concrete** | Carnegie Mellon University | 2021-2023.
        PI: Joshua Bard. Conducted aggregate mixture experiments and testing, designed and fabricated an actuated printing
        bed, and worked on geometry and structural design.'
    - bullet: '**Undergraduate Research Assistantship — Self-Built Housing System in Urban-Rural China** | Cornell University
        | 2019. PI: Leslie Lok. Studied urban development paradigms, construction systems based on local materials and resources,
        and housing typologies.'
    Teaching Experience:
    - bullet: '**Sole Instructor, 48-757 Architectural Robotics with Perception** | Carnegie Mellon University School of Architecture
        | Spring 2026. Designed and taught a new graduate-level course introducing perception-enabled robotic workflows for
        architectural design and fabrication. Topics included ROS-based robotic systems, computer vision, depth sensing, object
        detection/segmentation, motion planning, human-robot interaction, and integrated final project development.'
    - bullet: '**Teaching Assistant / Co-Instructor, 48-555/48-755 Introduction to Architectural Robotics** | Carnegie Mellon
        University School of Architecture | Fall 2025. Developed assignments for students to master principal robot planning
        skills for ABB robot motion and execution; supervised and mentored final projects.'
    - bullet: '**Teaching Assistant, Fundamentals of Computational Design** | Carnegie Mellon University School of Architecture
        | Spring 2025. Developed syllabus modules; mentored student projects and participated in reviews.'
    - bullet: '**Teaching Assistant / Co-Instructor, 48-555/48-755 Introduction to Architectural Robotics** | Carnegie Mellon
